<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luigui page</title>
</head>
<style>
#texto {
    font-size: 18px;
    text-align: center;
}
#nome {
    font-size: 36px;
    text-align: center;
}

.lista {
    text-align: left;
    width: 1000px;
    margin: 0%;
}
a {
    text-decoration: none;
    color: inherit;
}

body {
    background-color: #F9FAFB;
    font-family: Arial, sans-serif;
    color: #3b5286;
    padding: 30px;
}

img {
    display: block;
    margin: 20px auto;
    width: 100%;
    max-width: 500px;
    height: auto;
    border-radius: 16px;
    object-fit: cover;
    align-items: center;
}

button {
    display: inline-block;
    padding: 10px 20px;
    background-color: #3359b3;
    color: #FFFFFF;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.4s;
    margin-left: auto;
}

button:hover {
    background-color: #1a57ff;
    color: #FFFFFF;
}

button a {
    display: block;
    width: 100%;
    height: 100%;
}

.layout {
    display: flex;
    align-items: flex-start;
    max-width: 1100px;
    margin: 0 auto;
}

.painel {
    flex: 1 1 300px; /* deixa o painel de texto responsivo */
    min-width: 260px;
}

.imagem-painel {
    flex: 1 1 500px; /* deixa o painel de imagem responsivo */
    max-width: 500px;
}

.imagem-painel img {
    margin: 0;
    width: 100%;
    height: auto;
    border-radius: 12px;
}

.lista {
    margin: 0;
    padding-left: 18px;
}
</style>
<body>
    <h1 id="nome">Luigui</h1>

    <p id ="texto">Olá, esse é meu cachorro, Luigui! carinhosamente chamado de Gigi.</p>

    <div class="layout">
        <div class="painel">
            <h2>Vantagens do gigi</h2>
            <ol class="lista">
                <li>Carinhoso</li>
                <li>Não faz bagunça</li>
                <li>Sabe ler</li>
                <li>É o gigi</li>
            </ol>
            <button><a href="gigi.jpeg" download="gigi.jpeg">Baixar imagem do gigi</a></button>
        </div>
        <div class="imagem-painel">
            <img src="gigi.jpeg" alt="Gigi">
        </div>
    </div>
</body>
</html>
